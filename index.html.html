  <script>
    // ===== STATE MANAGEMENT =====
    const APP_KEY = 'aprovapolicial_data';
    
    let state = {
      currentScreen: 'profiles',

      profiles: [],
      // Timer state (duration stored in seconds)
      timerRunning: false,
      timerSeconds: 0, // derived elapsed seconds for display
      timerStartEpoch: null, // Date.now() when current run started
      timerAccumulatedSeconds: 0, // seconds accumulated from previous runs
      timerInterval: null
    };

    // Default config
    const defaultConfig = {
      app_title: 'Aprova Policial',
      welcome_message: 'Bem-vindo ao seu sistema de estudos',
      primary_color: '#102a43',
      secondary_color: '#0967d2',
      background_color: '#f8fafc',
      text_color: '#1e293b',
      accent_color: '#47a3f3',

      font_size: 16
    };

    let config = { ...defaultConfig };

    // ===== LOCAL STORAGE =====
    function saveToStorage() {
      const data = {
        profiles: state.profiles,
        lastBackup: new Date().toISOString()
      };
      localStorage.setItem(APP_KEY, JSON.stringify(data));
    }

    function loadFromStorage() {
      const data = localStorage.getItem(APP_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        state.profiles = parsed.profiles || [];
      }
    }

    // ===== UTILITY FUNCTIONS =====
    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function formatDate(date) {
      return new Date(date).toLocaleDateString('pt-BR');
    }

function getCurrentContest() {
  const profile = state.profiles.find(p => p.id === state.currentProfile);
  return profile?.contests?.find(c => c.id === state.currentContest) || null;
}

function getTopicById(contest, topicId) {
  return contest?.syllabus?.find(t => t.id === topicId) || null;
}

function getSubtopicById(topic, subtopicId) {
  return topic?.subtopics?.find(st => st.id === subtopicId) || null;
}

function updateTopicAggregates(contest, topicId) {
  // Recompute topic question stats from all question blocks tied to the topic (including subtópicos)
  const topic = getTopicById(contest, topicId);
  if (!topic) return;
  const blocks = (contest.questions || []).filter(q => q.topicId === topicId);
  const total = blocks.reduce((acc, q) => acc + (q.total || 0), 0);
  const correct = blocks.reduce((acc, q) => acc + (q.correct || 0), 0);
  topic.questions = total;
  topic.accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

  // Aggregate time from subtópicos (timeSpent is stored in minutes) + keep existing topic.timeSpent (which may include direct time)
  if (Array.isArray(topic.subtopics) && topic.subtopics.length > 0) {
    const subMin = topic.subtopics.reduce((acc, st) => acc + (st.timeSpent || 0), 0);
    // If topic.timeSpent already includes subtópicos (because we add to it), keep it; otherwise ensure minimum equals subMin
    topic.timeSpent = Math.max(topic.timeSpent || 0, subMin);
  }
}

function updateSubtopicStats(contest, topicId, subtopicId) {
  const topic = getTopicById(contest, topicId);
  const sub = getSubtopicById(topic, subtopicId);
  if (!topic || !sub) return;
  const blocks = (contest.questions || []).filter(q => q.topicId === topicId && q.subtopicId === subtopicId);
  const total = blocks.reduce((acc, q) => acc + (q.total || 0), 0);
  const correct = blocks.reduce((acc, q) => acc + (q.correct || 0), 0);
  sub.questions = total;
  sub.accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
}


function recomputeTopicNextReview(topic) {
  if (!topic) return;
  const dates = [];
  if (topic.nextReview) dates.push(topic.nextReview);
  (topic.subtopics || []).forEach(st => { if (st.nextReview) dates.push(st.nextReview); });
  if (dates.length === 0) {
    topic.nextReview = null;
    return;
  }
  const minIso = dates
    .map(d => ({ iso: d, t: new Date(d).getTime() }))
    .filter(o => !Number.isNaN(o.t))
    .sort((a,b) => a.t - b.t)[0]?.iso;
  topic.nextReview = minIso || topic.nextReview || null;

function syncNextReviews(contest) {
  if (!contest) return;
  const syllabus = contest.syllabus || [];
  // reset
  syllabus.forEach(t => {
    t.nextReview = null;
    (t.subtopics || []).forEach(st => { st.nextReview = null; });
  });

  const pending = (contest.reviews || []).filter(r => !r.completed && r.dueDate);
  pending.forEach(r => {
    const topic = syllabus.find(t => t.id === r.topicId);
    if (!topic) return;
    if (r.subtopicId) {
      const st = (topic.subtopics || []).find(s => s.id === r.subtopicId);
      if (st) {
        if (!st.nextReview || new Date(r.dueDate).getTime() < new Date(st.nextReview).getTime()) st.nextReview = r.dueDate;
      }
    } else {
      if (!topic.nextReview || new Date(r.dueDate).getTime() < new Date(topic.nextReview).getTime()) topic.nextReview = r.dueDate;
    }
  });

  syllabus.forEach(t => recomputeTopicNextReview(t));
}
}

function setSessionPrefill(topicId, subtopicId) {
  state.sessionPrefill = { topicId: topicId || null, subtopicId: subtopicId || null };
  const contest = getCurrentContest();
  if (contest) contest.currentTab = 'sessions';
  saveToStorage();
  render();
}

function goToPlanWithPrefill(topicId, subtopicId) {
  state.sessionPrefill = { topicId: topicId || null, subtopicId: subtopicId || null };
  const contest = getCurrentContest();
  if (contest) contest.currentTab = 'plan';
  saveToStorage();
  render();
}


function updateSessionSubtopicOptions() {
  const contest = getCurrentContest();
  if (!contest) return;
  const topicSelect = document.getElementById('session-topic');
  const subSelect = document.getElementById('session-subtopic');
  if (!topicSelect || !subSelect) return;

  const topicId = topicSelect.value || '';
  const topic = (contest.syllabus || []).find(t => t.id === topicId);
  const subs = topic ? (topic.subtopics || []) : [];

  const currentVal = subSelect.value;
  subSelect.innerHTML = `<option value="">Subtópico (opcional)</option>` + subs.map(st => `<option value="${st.id}">${st.name}</option>`).join('');

  // Keep selection if still exists
  if (currentVal && subs.some(st => st.id === currentVal)) {
    subSelect.value = currentVal;
  } else {
    subSelect.value = '';
  }
}

function applySessionPrefillIfAny() {
  const contest = getCurrentContest();
  if (!contest) return;
  if (!state.sessionPrefill) return;

  const topicSelect = document.getElementById('session-topic');
  const subSelect = document.getElementById('session-subtopic');
  if (!topicSelect || !subSelect) return;

  if (state.sessionPrefill.topicId) {
    topicSelect.value = state.sessionPrefill.topicId;
  }
  updateSessionSubtopicOptions();
  if (state.sessionPrefill.subtopicId) {
    subSelect.value = state.sessionPrefill.subtopicId;
  }
}

function createManualReview(contest, topicId, subtopicId, dueDateIso) {
  if (!contest) return;
  const topic = getTopicById(contest, topicId);
  if (!topic) return;
  const sub = subtopicId ? getSubtopicById(topic, subtopicId) : null;

  contest.reviews = contest.reviews || [];
  contest.reviews.push({
    id: generateId(),
    topicId,
    topicName: topic.name,
    subtopicId: sub ? sub.id : null,
    subtopicName: sub ? sub.name : null,
    dueDate: dueDateIso,
    completed: false,
    interval: 0
  });

  // Store nextReview at the most specific level
  if (sub) {
    sub.nextReview = dueDateIso;
  } else {
    topic.nextReview = dueDateIso;
  }

  // Also keep topic.nextReview as the nearest review among its subtopics / itself
  syncNextReviews(contest);
}

        app.innerHTML = renderProfileHomeScreen();
      } else if (state.currentScreen === 'contest') {
        app.innerHTML = renderContestScreen();
      }
      
      attachEventListeners();
    }

    function renderTabContent(tab, contest) {

        case 'sessions': return renderSessions(contest);
        case 'questions': return renderQuestions(contest);
        case 'reviews': return renderReviews(contest);
        case 'simulations': return renderSimulations(contest);
        case 'files': return renderFiles(contest);
        case 'reports': return renderReports(contest);
        case 'backup': return renderBackup(contest);
        default: return renderDashboard(contest);
      }
    }

    function renderDashboard(contest) {
      const syllabus = contest.syllabus || [];
      const sessions = contest.sessions || [];
      const questions = contest.questions || [];
      const reviews = contest.reviews || [];
      
      const progress = calculateProgress(syllabus);
      const totalHours = sessions.reduce((acc, s) => acc + (s.duration || 0), 0);
      const weekHours = sessions.filter(s => {
        const sessionDate = new Date(s.date);
        const weekAgo = new Date();
        weekAgo.setDate(weekAgo.getDate() - 7);
        return sessionDate >= weekAgo;
      }).reduce((acc, s) => acc + (s.duration || 0), 0);
      
      const totalQuestions = questions.reduce((acc, q) => acc + (q.total || 0), 0);
      const correctQuestions = questions.reduce((acc, q) => acc + (q.correct || 0), 0);
      const accuracy = totalQuestions > 0 ? Math.round((correctQuestions / totalQuestions) * 100) : 0;
      
      const pendingReviews = reviews.filter(r => !r.completed && new Date(r.dueDate) <= new Date()).length;

      // Suggestions
      const suggestions = [];
      const lowPerformanceTopics = syllabus.filter(s => s.accuracy && s.accuracy < 60);
      const overdueReviews = reviews.filter(r => !r.completed && new Date(r.dueDate) < new Date());
      
      if (overdueReviews.length > 0) {
        suggestions.push({ type: 'review', text: `${overdueReviews.length} revisão(ões) atrasada(s)`, priority: 'high' });
      }
      if (lowPerformanceTopics.length > 0) {
        suggestions.push({ type: 'study', text: `Revisar: ${lowPerformanceTopics[0]?.name || 'Tópico com baixo desempenho'}`, priority: 'medium' });
      }
      const notStudied = syllabus.filter(s => !s.lastStudied);
      if (notStudied.length > 0) {
        suggestions.push({ type: 'new', text: `Iniciar: ${notStudied[0]?.name || 'Novo tópico'}`, priority: 'low' });
      }

      return `
        <div class="p-6 fade-in">
          <div class="mb-6">
            <h1 class="text-2xl font-bold text-navy-900">Dashboard</h1>
            <p class="text-gray-500">Visão geral do seu progresso</p>
          </div>

          <!-- Stats Grid -->
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-gray-500 text-sm">Progresso do Edital</span>
                <div class="w-8 h-8 bg-accent-100 rounded-lg flex items-center justify-center text-accent-600">
                  ${icons.target}
                </div>
              </div>
              <p class="text-3xl font-bold text-navy-900">${progress}%</p>
              <div class="mt-2 h-2 bg-gray-100 rounded-full">
                <div class="h-full bg-accent-500 rounded-full transition-all" style="width: ${progress}%"></div>
              </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-gray-500 text-sm">Horas esta Semana</span>
                <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center text-green-600">
                  ${icons.clock}
                </div>
              </div>
              <p class="text-3xl font-bold text-navy-900">${formatTime(weekHours)}</p>
              <p class="text-sm text-gray-500 mt-1">Total: ${formatTime(totalHours)}</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-gray-500 text-sm">Taxa de Acerto</span>
                <div class="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-600">
                  ${icons.check}
                </div>
              </div>
              <p class="text-3xl font-bold text-navy-900">${accuracy}%</p>
              <p class="text-sm text-gray-500 mt-1">${totalQuestions} questões</p>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center justify-between mb-3">
                <span class="text-gray-500 text-sm">Revisões Pendentes</span>
                <div class="w-8 h-8 ${pendingReviews > 0 ? 'bg-red-100 text-red-600' : 'bg-gray-100 text-gray-600'} rounded-lg flex items-center justify-center">
                  ${icons.refresh}
                </div>
              </div>
              <p class="text-3xl font-bold ${pendingReviews > 0 ? 'text-red-600' : 'text-navy-900'}">${pendingReviews}</p>
              <p class="text-sm text-gray-500 mt-1">Atrasadas</p>
            </div>
          </div>

          <!-- Two Column Layout -->
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- What to Study Today -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <div class="flex items-center gap-2 mb-4">
                ${icons.lightbulb}
                <h3 class="font-semibold text-navy-900">O que estudar hoje?</h3>
              </div>
              ${suggestions.length === 0 ? `
                <div class="text-center py-6 text-gray-500">
                  <p>Adicione tópicos ao edital para receber sugestões personalizadas.</p>
                </div>
              ` : `

                <select id="session-type" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:ring-2 focus:ring-accent-500 focus:border-accent-500 outline-none">

                  <option value="questions">Questões</option>

    function renderQuestions(contest) {
      const questions = contest.questions || [];
      const syllabus = contest.syllabus || [];
      
      const totalQuestions = questions.reduce((acc, q) => acc + (q.total || 0), 0);
      const correctQuestions = questions.reduce((acc, q) => acc + (q.correct || 0), 0);
      const errorQuestions = totalQuestions - correctQuestions;
      
      return `
        <div class="p-6 fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-bold text-navy-900">Questões & Erros</h1>
              <p class="text-gray-500">Registre e analise seu desempenho em questões</p>
            </div>
            <button onclick="showAddQuestionsModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-accent-600 text-white rounded-lg hover:bg-accent-700 transition text-sm font-medium">
              ${icons.plus}
              <span>Registrar Questões</span>
            </button>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-navy-900">${totalQuestions}</p>
              <p class="text-sm text-gray-500">Total de Questões</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-green-600">${correctQuestions}</p>
              <p class="text-sm text-gray-500">Acertos</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-red-600">${errorQuestions}</p>
              <p class="text-sm text-gray-500">Erros</p>
            </div>
          </div>

          <!-- Questions List -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100">
              <h3 class="font-semibold text-navy-900">Blocos de Questões</h3>
            </div>
            ${questions.length === 0 ? `
              <div class="p-12 text-center text-gray-500">
                <p>Nenhum bloco de questões registrado.</p>
              </div>
            ` : `
              <div class="divide-y divide-gray-100">
                ${questions.map(q => `
                  <div class="px-5 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                      <div class="w-10 h-10 bg-accent-100 rounded-lg flex items-center justify-center text-accent-600">
                        ${icons.question}
                      </div>
                      <div>
                        <p class="font-medium text-navy-900">${q.subtopicName ? `${q.topicName} • ${q.subtopicName}` : (q.topicName || 'Geral')}</p>
                        <p class="text-sm text-gray-500">${q.source || 'Sem fonte'} • ${formatDate(q.date)}</p>
                      </div>
                    </div>
                    <div class="flex items-center gap-4">
                      <div class="text-right">
                        <p class="font-medium text-navy-900">${q.correct}/${q.total}</p>
                        <p class="text-sm ${(q.correct / q.total * 100) >= 70 ? 'text-green-600' : 'text-red-600'}">${Math.round(q.correct / q.total * 100)}%</p>
                      </div>
                      <button onclick="deleteQuestionBlock('${q.id}')" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
                        ${icons.trash}
                      </button>
                    </div>
                  </div>
                `).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderReviews(contest) {
      const reviews = contest.reviews || [];
      const settings = contest.reviewSettings || { intervals: [1, 7, 30] };
      
      const pending = reviews.filter(r => !r.completed);
      const overdue = pending.filter(r => new Date(r.dueDate) < new Date());
      const today = pending.filter(r => {
        const due = new Date(r.dueDate);
        const now = new Date();
        return due.toDateString() === now.toDateString();
      });
      
      return `
        <div class="p-6 fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>
              <h1 class="text-2xl font-bold text-navy-900">Revisões</h1>
              <p class="text-gray-500">Gerencie suas revisões espaçadas</p>
            </div>
            <button onclick="showReviewSettingsModal()" class="inline-flex items-center gap-2 px-4 py-2 bg-white text-navy-700 rounded-lg hover:bg-gray-50 transition text-sm font-medium border border-gray-200">
              ${icons.edit}
              <span>Configurar Intervalos</span>
            </button>
          </div>

          <!-- Review Stats -->
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-red-600">${overdue.length}</p>
              <p class="text-sm text-gray-500">Atrasadas</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-amber-600">${today.length}</p>
              <p class="text-sm text-gray-500">Para Hoje</p>
            </div>
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 text-center">
              <p class="text-3xl font-bold text-navy-900">${pending.length}</p>
              <p class="text-sm text-gray-500">Total Pendentes</p>
            </div>
          </div>

          <!-- Intervals Config Display -->
          <div class="bg-navy-50 rounded-xl p-4 mb-6 border border-navy-100">
            <p class="text-sm text-navy-700">
              <strong>Intervalos configurados:</strong> ${settings.intervals.join(' → ')} dias
            </p>
          </div>

          <!-- Pending Reviews -->
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100">
              <h3 class="font-semibold text-navy-900">Agenda de Revisões</h3>
            </div>
            ${pending.length === 0 ? `
              <div class="p-12 text-center text-gray-500">
                <p>Nenhuma revisão pendente.</p>
              </div>
            ` : `
              <div class="divide-y divide-gray-100">
                ${pending.sort((a, b) => new Date(a.dueDate) - new Date(b.dueDate)).map(review => {
                  const isOverdue = new Date(review.dueDate) < new Date();
                  const isToday = new Date(review.dueDate).toDateString() === new Date().toDateString();
                  return `
                    <div class="px-5 py-4 flex items-center justify-between ${isOverdue ? 'bg-red-50' : isToday ? 'bg-amber-50' : ''}">
                      <div class="flex items-center gap-4">
                        <div class="w-10 h-10 ${isOverdue ? 'bg-red-100 text-red-600' : 'bg-accent-100 text-accent-600'} rounded-lg flex items-center justify-center">
                          ${icons.refresh}
                        </div>
                        <div>
                          <p class="font-medium text-navy-900">${review.topicName || 'Tópico'}</p>
                          <p class="text-sm ${isOverdue ? 'text-red-600' : 'text-gray-500'}">
                            ${isOverdue ? 'Atrasada desde ' : ''}${formatDate(review.dueDate)}
                          </p>
                        </div>
                      </div>
                      <div class="flex items-center gap-2">
                        <button onclick="completeReview('${review.id}')" class="inline-flex items-center gap-1 px-3 py-1.5 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm">
                          ${icons.check}
                          <span>Concluir</span>
                        </button>
                        <button onclick="postponeReview('${review.id}')" class="inline-flex items-center gap-1 px-3 py-1.5 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition text-sm">
                          <span>Adiar</span>
                        </button>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    }

    function renderSimulations(contest) {

      return `
        <div class="p-6 fade-in">

    function renderFiles(contest) {
      const files = contest.files || [];
      
      return `
        <div class="p-6 fade-in">
          <div class="flex items-center justify-between mb-6">
            <div>

          ${files.length === 0 ? `

              <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                ${icons.folder}
              </div>
              <h4 class="text-lg font-medium text-navy-900 mb-2">Nenhum arquivo cadastrado</h4>

                    </div>
                  </div>
                </div>
              `).join('')}

    function renderReports(contest) {
      const sessions = contest.sessions || [];
      const questions = contest.questions || [];
      const syllabus = contest.syllabus || [];
      
      // Hours by discipline
      const hoursByDiscipline = {};
      sessions.forEach(s => {
        const topic = syllabus.find(t => t.id === s.topicId);
        const discipline = topic?.parent || topic?.name || 'Outros';
        hoursByDiscipline[discipline] = (hoursByDiscipline[discipline] || 0) + (s.duration || 0);
      });
      
      // Accuracy by topic
      const accuracyByTopic = {};
      questions.forEach(q => {
        const topic = syllabus.find(t => t.id === q.topicId);
        const name = topic?.name || 'Geral';
        if (!accuracyByTopic[name]) {
          accuracyByTopic[name] = { correct: 0, total: 0 };
        }
        accuracyByTopic[name].correct += q.correct;
        accuracyByTopic[name].total += q.total;
      });
      
      return `
        <div class="p-6 fade-in">
          <div class="mb-6">
            <h1 class="text-2xl font-bold text-navy-900">Relatórios</h1>
            <p class="text-gray-500">Análise detalhada do seu desempenho</p>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Hours by Discipline -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <h3 class="font-semibold text-navy-900 mb-4">Horas por Disciplina</h3>
              ${Object.keys(hoursByDiscipline).length === 0 ? `
                <p class="text-gray-500 text-center py-8">Registre sessões de estudo para ver estatísticas.</p>
              ` : `
                <div class="space-y-3">
                  ${Object.entries(hoursByDiscipline).sort((a, b) => b[1] - a[1]).slice(0, 8).map(([name, seconds]) => `
                    <div>
                      <div class="flex justify-between text-sm mb-1">
                        <span class="text-navy-700">${name}</span>
                        <span class="text-gray-500">${formatTime(seconds)}</span>
                      </div>
                      <div class="h-2 bg-gray-100 rounded-full">
                        <div class="h-full bg-accent-500 rounded-full" style="width: ${Math.min(seconds / Math.max(...Object.values(hoursByDiscipline)) * 100, 100)}%"></div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>

            <!-- Accuracy by Topic -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
              <h3 class="font-semibold text-navy-900 mb-4">% Acertos por Matéria</h3>
              ${Object.keys(accuracyByTopic).length === 0 ? `
                <p class="text-gray-500 text-center py-8">Registre questões para ver estatísticas.</p>
              ` : `
                <div class="space-y-3">
                  ${Object.entries(accuracyByTopic).map(([name, data]) => {
                    const accuracy = Math.round(data.correct / data.total * 100);
                    return `
                      <div>
                        <div class="flex justify-between text-sm mb-1">
                          <span class="text-navy-700">${name}</span>
                          <span class="${accuracy >= 70 ? 'text-green-600' : accuracy >= 50 ? 'text-amber-600' : 'text-red-600'}">${accuracy}%</span>
                        </div>
                        <div class="h-2 bg-gray-100 rounded-full">
                          <div class="h-full rounded-full ${accuracy >= 70 ? 'bg-green-500' : accuracy >= 50 ? 'bg-amber-500' : 'bg-red-500'}" style="width: ${accuracy}%"></div>
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              `}
            </div>

            <!-- Critical Topics -->
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 lg:col-span-2">
              <h3 class="font-semibold text-navy-900 mb-4">Tópicos Críticos (Baixo Desempenho)</h3>
              ${syllabus.filter(t => t.accuracy && t.accuracy < 60).length === 0 ? `
                <p class="text-gray-500 text-center py-8">Nenhum tópico com baixo desempenho identificado.</p>
              ` : `
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  ${syllabus.filter(t => t.accuracy && t.accuracy < 60).map(topic => `
                    <div class="bg-red-50 border border-red-100 rounded-lg p-3">
                      <p class="font-medium text-navy-900">${topic.name}</p>
                      <p class="text-sm text-red-600">${topic.accuracy}% de acertos</p>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>
          </div>
        </div>
      `;
    }

    function createProfile(event) {
      event.preventDefault();
      const name = document.getElementById('profile-name').value.trim();
      if (!name) return;
      
      const profile = {
        id: generateId(),
        name,
        createdAt: new Date().toISOString(),
        contests: [],
        archivedContests: []
      };
      
      state.profiles.push(profile);
      saveToStorage();
      closeModal();
      render();
    }

    function selectProfile(id) {
      state.currentProfile = id;
      state.currentScreen = 'profileHome';
      render();
    }

    function goToProfiles() {
      state.currentScreen = 'profiles';
      state.currentProfile = null;
      state.currentContest = null;
      render();
    }

    function goToProfileHome() {
      state.currentScreen = 'profileHome';
      state.currentContest = null;
      render();
    }

    function deleteProfile(id) {
      const profile = state.profiles.find(p => p.id === id);
      if (!profile) return;
      
      showModal(`
        <div class="p-6">
          <h3 class="text-lg font-bold text-navy-900 mb-2">Excluir Perfil?</h3>

          </div>
        </div>
      `);
    }

    function confirmDeleteProfile(id) {
      state.profiles = state.profiles.filter(p => p.id !== id);
      saveToStorage();
      closeModal();
      render();
    }

    function createContest(event) {
      event.preventDefault();
      const name = document.getElementById('contest-name').value.trim();
      const organization = document.getElementById('contest-org').value.trim();
      if (!name) return;
      
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      if (!profile) return;
      
      const contest = {
        id: generateId(),
        name,
        organization,
        createdAt: new Date().toISOString(),
        currentTab: 'dashboard',
        syllabus: [],
        sessions: [],
        questions: [],
        reviews: [],
        simulations: [],
        files: [],
        trash: [],
        plan: { mode: 'pre', weeklyGoal: 20, questionGoal: 100 },
        reviewSettings: { intervals: [1, 7, 30] }
      };
      
      profile.contests = profile.contests || [];
      profile.contests.push(contest);
      saveToStorage();
      closeModal();
      render();
    }

    function selectContest(id) {
      state.currentContest = id;
      state.currentScreen = 'contest';
      render();
    }

    function archiveContest(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      if (!profile) return;
      
      const contestIndex = profile.contests.findIndex(c => c.id === id);
      if (contestIndex === -1) return;
      
      const contest = profile.contests.splice(contestIndex, 1)[0];
      profile.archivedContests = profile.archivedContests || [];
      profile.archivedContests.push(contest);
      saveToStorage();
      render();
    }

    function unarchiveContest(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      if (!profile) return;
      
      const contestIndex = profile.archivedContests.findIndex(c => c.id === id);
      if (contestIndex === -1) return;
      
      const contest = profile.archivedContests.splice(contestIndex, 1)[0];
      profile.contests.push(contest);
      saveToStorage();
      render();
    }

    function switchTab(tab) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      contest.currentTab = tab;
      saveToStorage();
      render();
    }

    function updateTopic(event, id) {
      event.preventDefault();
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      const topic = contest?.syllabus?.find(t => t.id === id);
      if (!topic) return;
      
      topic.name = document.getElementById('edit-topic-name').value.trim();
      topic.status = document.getElementById('edit-topic-status').value;
      topic.priority = document.getElementById('edit-topic-priority').value;
      topic.weight = parseInt(document.getElementById('edit-topic-weight').value) || 1;
      
      saveToStorage();
      closeModal();
      render();
    }

    function deleteTopic(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      const topicIndex = contest.syllabus?.findIndex(t => t.id === id);
      if (topicIndex === -1) return;
      
      const topic = contest.syllabus.splice(topicIndex, 1)[0];
      contest.trash = contest.trash || [];
      contest.trash.push({ ...topic, deletedAt: new Date().toISOString() });
      
      saveToStorage();
      render();
    }

    function addQuestions(event) {
      event.preventDefault();
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;

      const topicId = document.getElementById('questions-topic').value;
      const subtopicId = document.getElementById('questions-subtopic') ? (document.getElementById('questions-subtopic').value || null) : null;
      const topic = contest.syllabus?.find(t => t.id === topicId);

      const questionBlock = {
        id: generateId(),
        topicId: topicId || null,
        topicName: topic?.name || 'Geral',
        subtopicId,
        subtopicName: subtopicId ? ((topic?.subtopics || []).find(st => st.id === subtopicId)?.name || null) : null,
        source: document.getElementById('questions-source').value.trim(),
        total: parseInt(document.getElementById('questions-total').value) || 0,
        correct: parseInt(document.getElementById('questions-correct').value) || 0,
        date: new Date().toISOString()
      };

      contest.questions = contest.questions || [];
      contest.questions.push(questionBlock);

      // Update stats (topic + subtópico)
      if (topicId) {
        if (subtopicId) {
          updateSubtopicStats(contest, topicId, subtopicId);
        }
        updateTopicAggregates(contest, topicId);
      }

      saveToStorage();
      closeModal();
      render();
    }

    function deleteQuestionBlock(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      contest.questions = contest.questions?.filter(q => q.id !== id) || [];
      saveToStorage();
      render();
    }

    function addSimulation(event) {
      event.preventDefault();
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      const total = parseInt(document.getElementById('sim-total').value) || 0;
      const correct = parseInt(document.getElementById('sim-correct').value) || 0;
      
      const simulation = {
        id: generateId(),
        name: document.getElementById('sim-name').value.trim(),
        total,
        correct,
        score: total > 0 ? Math.round((correct / total) * 100) : 0,
        date: new Date().toISOString()
      };
      
      contest.simulations = contest.simulations || [];
      contest.simulations.push(simulation);
      
      saveToStorage();
      closeModal();
      render();
    }

    function completeReview(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      const review = contest?.reviews?.find(r => r.id === id);
      if (!review) return;
      
      review.completed = true;
      review.completedAt = new Date().toISOString();
      syncNextReviews(contest);
      
      saveToStorage();
      render();
    }

    function postponeReview(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      const review = contest?.reviews?.find(r => r.id === id);
      if (!review) return;
      
      const newDate = new Date(review.dueDate);
      newDate.setDate(newDate.getDate() + 1);
      review.dueDate = newDate.toISOString();
      syncNextReviews(contest);
      
      saveToStorage();
      render();
    }

    function setPlanMode(mode) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      contest.plan = contest.plan || {};
      contest.plan.mode = mode;
      
      saveToStorage();
      render();
    }

    function updatePlanGoal(key, value) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;
      
      contest.plan = contest.plan || {};
      contest.plan[key] = parseInt(value) || 0;
      
      saveToStorage();
    }

    // Timer functions (drift-free; accurate even when switching tabs)
    function getTimerElapsedSeconds() {
      if (state.timerRunning && state.timerStartEpoch) {
        const live = Math.floor((Date.now() - state.timerStartEpoch) / 1000);
        return state.timerAccumulatedSeconds + Math.max(0, live);
      }
      return state.timerAccumulatedSeconds;
    }

    function updateTimerDisplay() {
      state.timerSeconds = getTimerElapsedSeconds();
      const display = document.getElementById('timer-display');
      if (display) display.textContent = formatTime(state.timerSeconds);
    }

    function startTimer() {
      if (state.timerRunning) return;
      state.timerRunning = true;
      state.timerStartEpoch = Date.now();
      // Use a short tick; elapsed time is computed from timestamps so it won't drift when the tab is inactive
      state.timerInterval = setInterval(updateTimerDisplay, 250);
      updateTimerDisplay();
      render();
    }

    function pauseTimer() {
      if (!state.timerRunning) return;
      state.timerAccumulatedSeconds = getTimerElapsedSeconds();
      state.timerRunning = false;
      state.timerStartEpoch = null;
      clearInterval(state.timerInterval);
      updateTimerDisplay();
      render();
    }

    function stopTimer() {
      const elapsed = getTimerElapsedSeconds();
      if (elapsed === 0) return;

      pauseTimer();

      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest) return;

      const topicSelect = document.getElementById('session-topic');
      const subtopicSelect = document.getElementById('session-subtopic');
      const typeSelect = document.getElementById('session-type');
      const topicId = topicSelect?.value || null;
      const subtopicId = subtopicSelect?.value || null;
      const topic = contest.syllabus?.find(t => t.id === topicId);
      const subtopic = (topic && subtopicId) ? (topic.subtopics || []).find(st => st.id === subtopicId) : null;

      const session = {
        id: generateId(),
        topicId,
        topicName: topic?.name || 'Sem tópico',
        subtopicId,
        subtopicName: subtopic?.name || null,
        type: typeSelect?.value || 'theory',
        duration: elapsed,
        date: new Date().toISOString()
      };

      contest.sessions = contest.sessions || [];
      contest.sessions.unshift(session);

      // Update topic time (stored in minutes)
      if (topic) {
        topic.timeSpent = (topic.timeSpent || 0) + Math.round(elapsed / 60);
        topic.lastStudied = new Date().toISOString();

        // Update subtópico time (stored in minutes)
        if (subtopic) {
          subtopic.timeSpent = (subtopic.timeSpent || 0) + Math.round(elapsed / 60);
          subtopic.lastStudied = new Date().toISOString();
        }

        // Create review if theory study
        if (typeSelect?.value === 'theory') {
          const intervals = contest.reviewSettings?.intervals || [1, 7, 30];
          const reviewDate = new Date();
          reviewDate.setDate(reviewDate.getDate() + intervals[0]);

          createManualReview(contest, topicId, subtopic ? subtopic.id : null, reviewDate.toISOString());
        }
      }

      state.timerSeconds = 0;
      state.timerAccumulatedSeconds = 0;
      state.timerStartEpoch = null;
      state.sessionPrefill = { topicId: null, subtopicId: null };
      saveToStorage();
      render();
    }

    // Keep timer display accurate when switching tabs/windows
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        updateTimerDisplay();
      }
    });

    function exportAllData() {

      };

    function exportProfile(id) {
      const profile = state.profiles.find(p => p.id === id);
      if (!profile) return;
      
      const data = {
        version: '1.0',
        exportedAt: new Date().toISOString(),
        type: 'profile',

      };
      
      downloadJSON(data, `perfil-${profile.name.toLowerCase().replace(/\s+/g, '-')}-${new Date().toISOString().split('T')[0]}.json`);
    }

    function exportContest(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === id);
      if (!contest) return;
      
      const data = {
        version: '1.0',
        exportedAt: new Date().toISOString(),
        type: 'contest',
        contest
      };
      
      downloadJSON(data, `concurso-${contest.name.toLowerCase().replace(/\s+/g, '-')}-${new Date().toISOString().split('T')[0]}.json`);
    }

    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            
            if (data.profiles) {
              // Full backup
              state.profiles = data.profiles;
            } else if (data.type === 'profile' && data.profile) {
              // Single profile
              data.profile.id = generateId(); // Generate new ID to avoid conflicts
              state.profiles.push(data.profile);
            } else if (data.type === 'contest' && data.contest && state.currentProfile) {
              // Single contest
              const profile = state.profiles.find(p => p.id === state.currentProfile);
              if (profile) {
                data.contest.id = generateId();
                profile.contests = profile.contests || [];
                profile.contests.push(data.contest);
              }
            }
            
            saveToStorage();
            render();
            
            showModal(`
              <div class="p-6 text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-600">
                  ${icons.check}
                </div>
                <h3 class="text-lg font-bold text-navy-900 mb-2">Importação Concluída!</h3>
                <p class="text-gray-600 mb-4">Os dados foram importados com sucesso.</p>
                <button onclick="closeModal()" class="px-6 py-2 bg-accent-600 text-white rounded-lg hover:bg-accent-700 transition font-medium">OK</button>
              </div>
            `);
          } catch (error) {
            showModal(`
              <div class="p-6 text-center">
                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-600">
                  ${icons.x}
                </div>
                <h3 class="text-lg font-bold text-navy-900 mb-2">Erro na Importação</h3>
                <p class="text-gray-600 mb-4">O arquivo não é um JSON válido ou está corrompido.</p>
                <button onclick="closeModal()" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">Fechar</button>
              </div>
            `);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    function restoreFromTrash(id) {
      const profile = state.profiles.find(p => p.id === state.currentProfile);
      const contest = profile?.contests?.find(c => c.id === state.currentContest);
      if (!contest || !contest.trash) return;
      
      const itemIndex = contest.trash.findIndex(t => t.id === id);
      if (itemIndex === -1) return;
      
      const item = contest.trash.splice(itemIndex, 1)[0];
      delete item.deletedAt;
      contest.syllabus = contest.syllabus || [];
      contest.syllabus.push(item);
      
      saveToStorage();
      render();
    }
